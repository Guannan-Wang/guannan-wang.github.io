# ============================================================================
# Research themes shown on /research/.  HOW TO EDIT (no coding needed):
#
# Each theme is one "- title:" block with three parts:
#   title:   the heading (plain text).
#   blurb:   the description. The ">" means "folded" — write as many wrapped
#            lines as you like (each continuation line indented under blurb);
#            they render as one paragraph. Use *word* for italics.
#   papers:  a list of publications shown under the theme, in the order listed.
#            Each entry is a "citekey" — the filename of the paper in
#            _publications/ WITHOUT ".md" (e.g. wang2026evolutionary). You can
#            also find it as the `citekey:` line inside any _publications/*.md.
#
# Common edits:
#   • Reword a theme .......... edit its blurb text.
#   • Reorder papers .......... reorder the lines under papers.
#   • Add a paper ............. add a new "    - <citekey>" line.
#   • Remove a paper .......... delete its line (the paper still shows on
#                               /publications/ — this only affects this page).
#   • Reorder / rename themes . move or edit a whole "- title:" block.
#   • Add a theme ............. copy an existing block and change its contents.
#   • Add a figure ............ add "  image: /images/research/<file>.jpg" under
#                               the title, and put the image in images/research/.
#
# Notes: keep the 2-space indentation exactly as shown. A citekey that doesn't
# match a paper is silently skipped (won't break the build). After saving,
# the Codespace preview refreshes automatically.
# ============================================================================
- title: "Genomic adaptation in extremophytes"
  blurb: >
    How do plants that thrive in extreme soils — high salinity, toxic boron,
    low phosphate — achieve stress tolerance? I use comparative genomics and
    transcriptomics of extremophytes such as *Schrenkiella parvula* and their
    stress-sensitive relatives to uncover the molecular basis of adaptation.
  papers:
    - wang2021cross
    - tran2023balancing
    - eshel2022positive
    - fan2018transcriptomic
    - wijesinghege2022spatiotemporal
    - tran2021multiple
    - wang2019plant

- title: "Cell-type-specific stress responses in roots"
  blurb: >
    Roots are built from specialized cell types that respond to stress in
    distinct ways. Using single-cell and cell-type-resolved approaches, I study
    how these responses are wired and how they diverge across species over
    evolutionary time.
  papers:
    - wang2026evolutionary
    - sun2022divergence
    - wang2025plant

- title: "Chromatin & epigenomic control of stress"
  blurb: >
    Chromatin state shapes which genes respond to environmental change. I
    investigate how histone variants such as H2A.Z and DNA-methylation dynamics
    regulate transcriptional responses to nutrient limitation and abiotic stress.
  papers:
    - zahraeifard2018rice
    - foroozani2020low
    - wang2026bidirectional

- title: "Comparative transcriptomics & computational tools"
  blurb: >
    Comparing stress responses across diverse, often non-model plants — from
    mangroves and seagrasses to desert crucifers — reveals conserved and
    lineage-specific strategies. I also build computational tools (e.g., GOMCL)
    to make sense of large functional-genomics datasets.
  papers:
    - nguyen2025transcriptome
    - short2024comparative
    - bird2024delayed
    - wimalagunasekara2026comparative
    - wang2020gomcl
