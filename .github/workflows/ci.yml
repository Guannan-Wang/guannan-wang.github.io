# Quality gate: build the site and check for broken internal links/anchors
# on every push to `draft`, before it is merged to `main`.
name: CI (build & link check)

on:
  push:
    branches: ["draft"]
  workflow_dispatch:

jobs:
  build-and-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Build site
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Install html-proofer
        run: gem install html-proofer

      - name: Check internal links & anchors
        # External links (DOIs, etc.) are skipped — they rate-limit CI and are
        # checked at author time. This gate catches dead internal links.
        run: htmlproofer ./_site --disable-external --allow-hash-href --checks Links
